<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Clave</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0f;
            --panel: #141418;
            --border: #1e2a38;
            --accent: #00c8f0;
            --accent2: #0066cc;
            --text: #e8f4ff;
            --muted: #4a6070;
            --success: #00e5a0;
            --danger: #ff4060;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,240,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,240,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 0 60px rgba(0,200,240,0.06), 0 20px 60px rgba(0,0,0,0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -1px; left: 20px; right: 20px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header .tag {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text);
        }

        .header h1 span {
            color: var(--accent);
        }

        /* Input section */
        .input-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            display: block;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .digit-input {
            width: 100%;
            background: #0a0a0c;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 28px;
            color: var(--accent);
            text-align: center;
            letter-spacing: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .digit-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,200,240,0.12);
        }

        .digit-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(255,64,96,0.12);
        }

        .digit-input::placeholder {
            color: var(--muted);
            letter-spacing: 4px;
            font-size: 18px;
        }

        .char-count {
            position: absolute;
            right: 14px;
            bottom: 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        /* Error message */
        .error-msg {
            font-size: 13px;
            color: var(--danger);
            text-align: center;
            min-height: 18px;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:hover {
            box-shadow: 0 0 24px rgba(0,200,240,0.3);
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1));
        }

        /* Result */
        .result-section {
            margin-top: 28px;
            display: none;
        }

        .result-section.visible {
            display: block;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            text-align: center;
            margin-bottom: 12px;
        }

        .result-clave {
            font-family: 'Share Tech Mono', monospace;
            font-size: 48px;
            color: var(--success);
            text-align: center;
            letter-spacing: 14px;
            text-shadow: 0 0 20px rgba(0,229,160,0.4);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(0,229,160,0.3); }
            to   { text-shadow: 0 0 28px rgba(0,229,160,0.7); }
        }

        /* Breakdown */
        .breakdown {
            margin-top: 20px;
            display: grid;
            gap: 6px;
        }

        .breakdown-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
        }

        .breakdown-num {
            font-family: 'Share Tech Mono', monospace;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent2);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .breakdown-desc {
            color: var(--muted);
            flex: 1;
            font-size: 12px;
        }

        .breakdown-val {
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            color: var(--success);
            font-weight: 700;
        }

        /* Copy button */
        .copy-btn {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .copy-btn.copied {
            border-color: var(--success);
            color: var(--success);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="tag">NUM · Logic</div>
        <h1>Generador de <span>Clave</span></h1>
    </div>

    <label class="input-label" for="claveInicial">Clave inicial</label>
    <div class="input-wrapper">
        <input
            type="tel"
            id="claveInicial"
            class="digit-input"
            maxlength="5"
            placeholder="_ _ _ _ _"
            inputmode="numeric"
            pattern="[0-9]*"
            autocomplete="off"
        >
        <span class="char-count" id="charCount">0/5</span>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn" onclick="generarClave()">⚡ Generar Clave</button>

    <div class="result-section" id="resultSection">
        <div class="result-divider"></div>
        <div class="result-label">Clave Generada</div>
        <div class="result-clave" id="resultadoClave"></div>

        <div class="breakdown" id="breakdown"></div>

        <button class="copy-btn" id="copyBtn" onclick="copiarClave()">📋 Copiar Clave</button>
    </div>
</div>

<script>
    const input = document.getElementById('claveInicial');
    const charCount = document.getElementById('charCount');
    const errorMsg = document.getElementById('errorMsg');

    input.addEventListener('input', () => {
        // Only allow digits
        input.value = input.value.replace(/\D/g, '');
        charCount.textContent = input.value.length + '/5';
        input.classList.remove('error');
        errorMsg.textContent = '';
        document.getElementById('resultSection').classList.remove('visible');
    });

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') generarClave();
    });

    function generarClave() {
        const claveInicial = input.value;

        if (claveInicial.length !== 5 || !/^\d{5}$/.test(claveInicial)) {
            input.classList.add('error');
            errorMsg.textContent = 'Ingresa exactamente 5 dígitos numéricos.';
            document.getElementById('resultSection').classList.remove('visible');
            return;
        }

        const c = claveInicial.split('').map(Number);

        // D1: quinto dígito de la clave inicial
        const d1 = c[4];

        // D2: |c[1] - c[2]|
        const d2 = Math.abs(c[1] - c[2]);

        // D3: unidad de |(2*c[3]) - c[1]|
        const d3 = Math.abs((2 * c[3]) - c[1]) % 10;

        // D4: decena de ((c[3]+c[4])*c[1] + (c[3]+c[4])*c[2])
        const suma45 = c[3] + c[4];
        const producto = suma45 * c[1] + suma45 * c[2];
        const d4 = Math.floor(producto / 10) % 10;

        // D5: unidad de la suma de todos
        const d5 = (c[0] + c[1] + c[2] + c[3] + c[4]) % 10;

        const nuevaClave = `${d1}${d2}${d3}${d4}${d5}`;

        document.getElementById('resultadoClave').textContent = nuevaClave;

        // Breakdown
        const descriptions = [
            { n: 1, desc: `5° dígito de la clave (${c[4]})`, val: d1 },
            { n: 2, desc: `|${c[1]} - ${c[2]}|`, val: d2 },
            { n: 3, desc: `Unidad de |2×${c[3]} - ${c[1]}| = ${Math.abs(2*c[3]-c[1])}`, val: d3 },
            { n: 4, desc: `Decena de (${suma45}×${c[1]} + ${suma45}×${c[2]}) = ${producto}`, val: d4 },
            { n: 5, desc: `Unidad de (${c.join('+')} = ${c.reduce((a,b)=>a+b,0)})`, val: d5 },
        ];

        const bdEl = document.getElementById('breakdown');
        bdEl.innerHTML = descriptions.map(r => `
            <div class="breakdown-row">
                <span class="breakdown-num">${r.n}</span>
                <span class="breakdown-desc">${r.desc}</span>
                <span class="breakdown-val">${r.val}</span>
            </div>
        `).join('');

        document.getElementById('copyBtn').textContent = '📋 Copiar Clave';
        document.getElementById('copyBtn').classList.remove('copied');
        document.getElementById('resultSection').classList.add('visible');
    }

    function copiarClave() {
        const clave = document.getElementById('resultadoClave').textContent;
        if (!clave) return;
        navigator.clipboard.writeText(clave).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = '✅ Copiada!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '📋 Copiar Clave';
                btn.classList.remove('copied');
            }, 2000);
        });
    }
</script>
</body>
</html>
